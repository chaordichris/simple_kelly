[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.mypy]
python_version = "3.11"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
check_untyped_defs = true
no_implicit_optional = true
strict_equality = true
files = [
  "app/data.py",
  "app/kelly.py",
  "app/models.py",
  "app/sim.py",
  "tests/test_data.py",
  "tests/test_kelly.py",
  "tests/test_sim.py",
]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
